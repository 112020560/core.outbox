name: OutboxWorker — Build, Test & Publish Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  WORKER_PROJECT: Src/OutboxWorker/OutboxWorker.csproj
  INTEGRATION_TESTS: Tests/OutboxWorker.IntegrationTests/OutboxWorker.IntegrationTests.csproj
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outbox-worker

jobs:
  build-and-test:
    name: Build & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Integration Tests
        run: dotnet test ${{ env.INTEGRATION_TESTS }} --no-build --configuration Release --logger "trx;LogFileName=worker-integration-results.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-test-results
          path: '**/*.trx'

  publish-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Src/OutboxWorker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
