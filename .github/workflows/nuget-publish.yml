name: SmartCore.Outbox — Build, Test & Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT: Src/SmartCore.Outbox/SmartCore.Outbox.csproj
  UNIT_TESTS: Tests/SmartCore.Outbox.UnitTests/SmartCore.Outbox.UnitTests.csproj
  INTEGRATION_TESTS: Tests/SmartCore.Outbox.IntegrationTests/SmartCore.Outbox.IntegrationTests.csproj

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outbox_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test ${{ env.UNIT_TESTS }} --no-build --configuration Release --logger "trx;LogFileName=unit-results.trx"

      - name: Integration Tests
        run: dotnet test ${{ env.INTEGRATION_TESTS }} --no-build --configuration Release --logger "trx;LogFileName=integration-results.trx"
        env:
          OUTBOX_CONNECTION_STRING: "Host=localhost;Port=5432;Database=outbox_db;Username=postgres;Password=postgres"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'

  publish:
    name: Pack & Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack ${{ env.PROJECT }} --no-restore --configuration Release --output ./nupkgs -p:Version=${{ env.VERSION }}

      - name: Publish
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
