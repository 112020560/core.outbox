services:
  outbox-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: outbox_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  outbox-worker:
    build:
      context: .
      dockerfile: Src/OutboxWorker/Dockerfile
    depends_on:
      outbox-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      Outbox__ConnectionString: "Host=outbox-db;Port=5432;Database=outbox_db;Username=postgres;Password=postgres"
      RabbitMq__Uri: "amqp://guest:guest@rabbitmq:5672"
    restart: unless-stopped
